<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unirse a Comunidad</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4eee8;
        --surface: #ffffff;
        --text: #1a0804;
        --muted: #6c4b3d;
        --primary: #c0522a;
        --border: #e7d5cb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .token {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f8f2ee;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        word-break: break-all;
        margin-bottom: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #f7f1ec;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .small {
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card">
        <h1>Únete a la comunidad</h1>
        <p id="status">Intentando abrir la app...</p>
        <div class="token" id="token">Cargando token...</div>

        <div class="actions">
          <button class="btn btn-primary" id="openApp">Abrir app</button>
          <button class="btn btn-secondary" id="openPlayStore">Ir a Play Store</button>
        </div>

        <p class="small">
          Si la app no abre automáticamente, usa el botón <strong>Abrir app</strong>.
        </p>
      </main>
    </div>

    <script>
      (function () {
        var APP_SCHEME_PREFIX = 'com.fbc.comunidades://invite/';
        var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.fbc.comunidades';

        function getInviteToken() {
          // Soporta:
          // 1) https://dominio.com/invite/<token>
          // 2) https://dominio.com/invite?token=<token>
          var path = window.location.pathname;
          var parts = path.split('/').filter(Boolean);
          var inviteIdx = parts.indexOf('invite');
          if (inviteIdx >= 0 && parts[inviteIdx + 1]) {
            return decodeURIComponent(parts[inviteIdx + 1]);
          }
          var params = new URLSearchParams(window.location.search);
          return params.get('token') || '';
        }

        var token = getInviteToken();
        var tokenEl = document.getElementById('token');
        var statusEl = document.getElementById('status');
        var appUrl = APP_SCHEME_PREFIX + encodeURIComponent(token);

        tokenEl.textContent = token || 'Token no encontrado en la URL';

        function openApp() {
          if (!token) {
            statusEl.textContent = 'No se encontró token de invitación.';
            return;
          }
          window.location.href = appUrl;
        }

        function openPlayStore() {
          window.location.href = PLAY_STORE_URL;
        }

        document.getElementById('openApp').addEventListener('click', openApp);
        document.getElementById('openPlayStore').addEventListener('click', openPlayStore);

        if (token) {
          // Intento automático, luego fallback visual.
          openApp();
          setTimeout(function () {
            statusEl.textContent = 'Si no se abrió la app, toca "Abrir app" o instala desde Play Store.';
          }, 1500);
        } else {
          statusEl.textContent = 'URL inválida: falta el token de invitación.';
        }
      })();
    </script>
  </body>
</html>
